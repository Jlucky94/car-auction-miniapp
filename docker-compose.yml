services:
  api:
    image: ghcr.io/jlucky94/car-auction-miniapp-api:latest
    environment:
      - PORT=3001
    restart: unless-stopped

  web:
    image: ghcr.io/jlucky94/car-auction-miniapp-web:latest
    ports:
      - "127.0.0.1:8090:80"
    depends_on:
      - api
    restart: unless-stopped
