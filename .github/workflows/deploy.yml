name: Deploy (Docker)

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    environment: car-auction-miniapp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/jlucky94/car-auction-miniapp-api:latest

      - name: Build & push WEB
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/jlucky94/car-auction-miniapp-web:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          OWNER: jlucky94
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "OWNER='${OWNER}' bash -s" <<'EOF'
          set -e

          mkdir -p /var/www/car-auction-miniapp
          cd /var/www/car-auction-miniapp

          cat > docker-compose.yml <<YAML
          services:
            api:
              image: ghcr.io/$OWNER/car-auction-miniapp-api:latest
              environment:
                - PORT=3001
              restart: unless-stopped

            web:
              image: ghcr.io/$OWNER/car-auction-miniapp-web:latest
              ports:
                - "80:80"
              depends_on:
                - api
              restart: unless-stopped
          YAML

          docker compose pull
          docker compose up -d
          docker image prune -f
          EOF
